<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex - Audio Interactive Vector Space</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #010103;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>

    <script>window.AnimationLibrary = {};</script>

    <script src="/static/animations/cylinder.js"></script>
    <script src="/static/animations/ocean.js"></script>
    <script src="/static/animations/chaos.js"></script>
    <script src="/static/animations/sphere.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    {% include '_dashboard.html' %}
    {% include '_audio.html' %}
    {% include '_interactivity.html' %}

    <script>
        let scene, camera, renderer, particleGeometry, particleSystem, particleMaterial;
        const particleCount = 9000;
        let activeMode = 'cylinder';
        let clock = new THREE.Clock();

        let targetPositions = new Float32Array(particleCount * 3);
        let baseColors = new Float32Array(particleCount * 3);
        let animationStates = {}; 

        // FX Modifiers Modulations
        let chromaActive = false;
        let chromaIntensity = 0.0;

        init();
        animate();

        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.6)');
            gradient.addColorStop(0.6, 'rgba(255, 255, 255, 0.15)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 130;

            particleGeometry = new THREE.BufferGeometry();
            let positions = new Float32Array(particleCount * 3);
            let colors = new Float32Array(particleCount * 3);

            // Execute component safety configurations
            for (let key in window.AnimationLibrary) {
                if(window.AnimationLibrary[key].setup) {
                    animationStates[key] = window.AnimationLibrary[key].setup(particleCount);
                }
            }

            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 200;
                positions[i*3+1] = (Math.random() - 0.5) * 200;
                positions[i*3+2] = (Math.random() - 0.5) * 200;

                if (Math.random() > 0.5) {
                    baseColors[i*3] = 0.95; baseColors[i*3+1] = 0.65; baseColors[i*3+2] = 0.15;
                } else {
                    baseColors[i*3] = 0.05; baseColors[i*3+1] = 0.80; baseColors[i*3+2] = 0.95;
                }
                colors[i*3] = baseColors[i*3];
                colors[i*3+1] = baseColors[i*3+1];
                colors[i*3+2] = baseColors[i*3+2];
            }

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            particleMaterial = new THREE.PointsMaterial({
                size: 1.4,
                map: createCircleTexture(),
                vertexColors: true,
                transparent: true,
                opacity: 0.75,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            buildUI();
            window.addEventListener('resize', onWindowResize);
        }

        function buildUI() {
            const controlsDiv = document.getElementById('controls');
            controlsDiv.innerHTML = '';
            for (let key in window.AnimationLibrary) {
                let btn = document.createElement('button');
                btn.className = `btn ${key === activeMode ? 'active' : ''}`;
                btn.id = `btn-${key}`;
                btn.innerText = window.AnimationLibrary[key].name;
                btn.onclick = () => switchMode(key);
                controlsDiv.appendChild(btn);
            }
        }

        function switchMode(modeKey) {
            activeMode = modeKey;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            const targetBtn = document.getElementById(`btn-${modeKey}`);
            if(targetBtn) targetBtn.classList.add('active');
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // 1. Calculate Core Mathematical Target Geometry
            const currentModule = window.AnimationLibrary[activeMode];
            const savedData = animationStates[activeMode];
            for (let i = 0; i < particleCount; i++) {
                let coords = currentModule.update(i, particleCount, time, savedData);
                targetPositions[i * 3] = coords.x;
                targetPositions[i * 3 + 1] = coords.y;
                targetPositions[i * 3 + 2] = coords.z;
            }

            // 2. Modulate Targets via External Sub-System Addons (Audio + Interaction)
            if (window.processAudioReactivity) window.processAudioReactivity(targetPositions, particleCount, time);
            if (window.processMousePhysics) window.processMousePhysics(targetPositions, particleCount);

            // 3. Interpolation LERP Update Frame Execution Loop
            const posAttr = particleGeometry.attributes.position;
            const colorAttr = particleGeometry.attributes.color;
            
            for (let i = 0; i < posAttr.array.length; i++) {
                posAttr.array[i] += (targetPositions[i] - posAttr.array[i]) * 0.08;
            }

            // 4. Chroma Spectral Fading Calculations
            const targetChroma = chromaActive ? 1.0 : 0.0;
            chromaIntensity += (targetChroma - chromaIntensity) * 0.05;
            
            let audioScale = window.currentAudioLowFreq ? window.currentAudioLowFreq * 2.5 : 0;
            particleMaterial.size = 1.4 + (chromaIntensity * 1.5) + audioScale;

            for (let i = 0; i < particleCount; i++) {
                if (chromaIntensity > 0.001) {
                    let hue = (i / particleCount * 360 + time * 45) % 360;
                    let c = new THREE.Color(`hsl(${hue}, 100%, 60%)`);
                    colorAttr.array[i * 3] = THREE.MathUtils.lerp(baseColors[i * 3], c.r, chromaIntensity);
                    colorAttr.array[i * 3 + 1] = THREE.MathUtils.lerp(baseColors[i * 3 + 1], c.g, chromaIntensity);
                    colorAttr.array[i * 3 + 2] = THREE.MathUtils.lerp(baseColors[i * 3 + 2], c.b, chromaIntensity);
                } else {
                    colorAttr.array[i * 3] = baseColors[i * 3];
                    colorAttr.array[i * 3 + 1] = baseColors[i * 3 + 1];
                    colorAttr.array[i * 3 + 2] = baseColors[i * 3 + 2];
                }
            }

            posAttr.needsUpdate = true;
            colorAttr.needsUpdate = true;
            
            particleSystem.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
