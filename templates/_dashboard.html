<style>
    .dashboard {
        position: absolute; top: 20px; left: 20px; z-index: 10;
        background: rgba(6, 6, 10, 0.5);
        backdrop-filter: blur(25px) saturate(200%);
        -webkit-backdrop-filter: blur(25px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px; padding: 24px; width: 270px; color: white;
        box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.9);
    }
    h2 { margin: 0 0 2px 0; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    p { color: rgba(255,255,255,0.4); font-size: 12px; margin: 0 0 20px 0; }
    .section-label {
        font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
        color: rgba(255,255,255,0.4); font-weight: 700; margin: 16px 0 8px 0;
    }
    #controls { display: flex; flex-direction: column; gap: 6px; }
    .btn {
        background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
        color: rgba(255,255,255,0.7); padding: 12px 16px; border-radius: 10px; cursor: pointer;
        font-weight: 600; font-size: 13px; text-align: left; transition: all 0.2s ease;
    }
    .btn:hover { background: rgba(255, 255, 255, 0.07); color: #fff; transform: translateX(2px); }
    .btn.active {
        background: linear-gradient(135deg, #1d4ed8, #6d28d9); color: white; border: none;
    }
    .audio-input-wrapper {
        background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.15);
        border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; position: relative;
    }
    .audio-input-wrapper:hover { background: rgba(255,255,255,0.05); }
    .audio-label { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 600; }
    #audioFile { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    
    /* Control Switches */
    .toggle-container {
        display: flex; align-items: center; justify-content: space-between;
        background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 12px 16px; border-radius: 10px; cursor: pointer; margin-top: 6px;
    }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background-color: rgba(255,255,255,0.15); transition: .25s ease; border-radius: 22px;
    }
    .slider:before {
        position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
        background-color: white; transition: .25s ease; border-radius: 50%;
    }
    input:checked + .slider { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
    input:checked + .slider:before { transform: translateX(18px); }
</style>

<div class="dashboard">
    <h2>VORTEX</h2>
    <p>Engine Core v3.0 (Modular Components)</p>
    
    <div class="section-label">Topologies</div>
    <div id="controls"></div>
    
    <div class="section-label">Audio Synchronization</div>
    <div class="audio-input-wrapper">
        <span class="audio-label" id="uploadLabel">Drop or Select MP3 Track</span>
        <input type="file" id="audioFile" accept="audio/*">
    </div>
    
    <button class="btn" style="margin-top: 8px; width: 100%; text-align: center; background: rgba(220, 38, 38, 0.15); border-color: rgba(220, 38, 38, 0.3); color: #fca5a5;" onclick="if(window.stopAudio) window.stopAudio();">
        ⏹️ Stop Music
    </button>

    <div class="section-label">FX Modifiers</div>
    <div class="toggle-container" onclick="chromaActive = !chromaActive; document.getElementById('chromaToggle').checked = chromaActive;">
        <span style="font-size: 13px; font-weight:600; color:rgba(255,255,255,0.8);">Chroma Spectral Glow</span>
        <label class="switch">
            <input type="checkbox" id="chromaToggle" onchange="event.stopPropagation(); chromaActive = this.checked;">
            <span class="slider"></span>
        </label>
    </div>
</div>
